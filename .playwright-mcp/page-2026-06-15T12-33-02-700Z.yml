          - generic [ref=e14]: Редакция от 15.06.2026
          - heading "Политика конфиденциальности и обработка персональных данных" [level=1] [ref=e15]
          - paragraph [ref=e16]: Единый документ описывает правила обработки персональных данных, согласие пользователя при отправке заявки и использование cookie на сайте ремонта кофемашин.
        - article [ref=e17]:
          - generic [ref=e18]:
            - heading "1. Общие положения" [level=2] [ref=e19]
            - paragraph [ref=e20]: Настоящая политика составлена в соответствии с Федеральным законом РФ от 27.07.2006 N 152-ФЗ «О персональных данных» и применяется к сайту, размещенному в сети Интернет для приема заявок на ремонт кофемашин в Москве.
            - paragraph [ref=e21]:
              - text: "Оператор персональных данных: владелец сайта, оказывающий услуги ремонта кофемашин в Москве. Контакт для обращений субъектов персональных данных:"
              - link "+7 (499) 719-13-48" [ref=e22] [cursor=pointer]:
                - /url: tel:+74997191348
              - text: .
            - paragraph [ref=e23]: "Перед публикацией сайта владельцу необходимо указать точное наименование оператора: ФИО, статус ИП/самозанятого или наименование юридического лица, а также актуальные контактные реквизиты."
          - generic [ref=e24]:
            - heading "2. Какие данные обрабатываются" [level=2] [ref=e25]
            - list [ref=e26]:
              - listitem [ref=e27]: имя пользователя, указанное в форме заявки;
              - listitem [ref=e28]: номер телефона;
              - listitem [ref=e29]: комментарий к заявке, модель кофемашины, описание неисправности и иная информация, которую пользователь указывает добровольно;
              - listitem [ref=e30]: "технические данные: IP-адрес, тип устройства и браузера, источник перехода, дата и время посещения, сведения о действиях на сайте;"
              - listitem [ref=e31]: cookie-файлы и аналогичные технологии, необходимые для работы сайта, аналитики посещаемости и улучшения пользовательского опыта.
            - paragraph [ref=e32]: Оператор не запрашивает специальные категории персональных данных, биометрические персональные данные, паспортные данные и платежные реквизиты через формы сайта.
          - generic [ref=e33]:
            - heading "3. Цели обработки" [level=2] [ref=e34]
            - list [ref=e35]:
              - listitem [ref=e36]: прием, обработка и уточнение заявок на ремонт кофемашин;
              - listitem [ref=e37]: обратная связь с пользователем по телефону, в Telegram, WhatsApp или иным выбранным способом связи;
              - listitem [ref=e38]: согласование диагностики, выезда мастера, стоимости и времени выполнения работ;
              - listitem [ref=e39]: обеспечение корректной работы сайта, защита от злоупотреблений и технических сбоев;
              - listitem [ref=e40]: анализ посещаемости и улучшение структуры, дизайна и содержания сайта;
              - listitem [ref=e41]: исполнение требований законодательства РФ.
          - generic [ref=e42]:
            - heading "4. Правовые основания обработки" [level=2] [ref=e43]
            - paragraph [ref=e44]: Обработка персональных данных осуществляется на основании согласия пользователя, выраженного путем проставления отметки в форме заявки и отправки формы, а также на основании действий пользователя, направленных на получение консультации или услуги.
          - generic [ref=e45]:
            - heading "5. Согласие на обработку персональных данных" [level=2] [ref=e46]
            - paragraph [ref=e47]: Заполняя форму заявки на сайте, проставляя отметку согласия и нажимая кнопку отправки формы, пользователь свободно, своей волей и в своем интересе дает оператору согласие на обработку персональных данных на условиях настоящего документа.
            - paragraph [ref=e48]: "Согласие предоставляется в отношении данных, указанных пользователем в форме: имени, номера телефона, комментария, сведений о кофемашине и описания неисправности. Также могут обрабатываться технические данные, необходимые для работы сайта и подтверждения факта обращения."
            - paragraph [ref=e49]:
              - text: Согласие действует до достижения целей обработки или до его отзыва пользователем. Пользователь вправе отозвать согласие, обратившись к оператору по телефону
              - link "+7 (499) 719-13-48" [ref=e50] [cursor=pointer]:
                - /url: tel:+74997191348
              - text: . После получения отзыва оператор прекращает обработку персональных данных, кроме случаев, когда продолжение обработки допускается законодательством РФ.
          - generic [ref=e51]:
            - heading "6. Использование cookie" [level=2] [ref=e52]
            - paragraph [ref=e53]: Сайт использует cookie для сохранения технических настроек, корректного отображения интерфейса, учета согласия на cookie, анализа посещаемости и повышения удобства работы сайта.
            - paragraph [ref=e54]: Пользователь может запретить или удалить cookie в настройках браузера. При отключении cookie отдельные функции сайта могут работать некорректно. Нажатие кнопки «Принять» в cookie-плашке означает согласие пользователя на использование cookie в рамках настоящей политики.
          - generic [ref=e55]:
            - heading "7. Действия с персональными данными и срок хранения" [level=2] [ref=e56]
            - paragraph [ref=e57]: Оператор может совершать с персональными данными сбор, запись, систематизацию, накопление, хранение, уточнение, использование, передачу в пределах целей обработки, обезличивание, блокирование, удаление и уничтожение.
            - paragraph [ref=e58]: Данные заявки хранятся до достижения целей обработки, отзыва согласия пользователем или истечения сроков, необходимых для защиты прав и законных интересов оператора. Технические cookie хранятся в течение срока, заданного настройками сайта и браузера пользователя.
          - generic [ref=e59]:
            - heading "8. Передача третьим лицам" [level=2] [ref=e60]
            - paragraph [ref=e61]: Оператор не продает и не передает персональные данные третьим лицам для самостоятельной рекламы. Передача возможна только в объеме, необходимом для работы сайта, связи с пользователем, хранения заявок, использования сервисов карт, хостинга, связи и аналитики, а также в случаях, предусмотренных законодательством РФ.
            - paragraph [ref=e62]: На сайте могут использоваться внешние сервисы, включая карты и средства связи. Такие сервисы могут получать технические данные пользователя в соответствии со своими правилами и настройками браузера.
          - generic [ref=e63]:
            - heading "9. Права пользователя" [level=2] [ref=e64]
            - list [ref=e65]:
              - listitem [ref=e66]: получать сведения об обработке своих персональных данных;
              - listitem [ref=e67]: требовать уточнения, блокирования или уничтожения персональных данных, если они являются неполными, устаревшими, неточными или обрабатываются незаконно;
              - listitem [ref=e68]: отозвать согласие на обработку персональных данных;
              - listitem [ref=e69]: обжаловать действия или бездействие оператора в уполномоченный орган или суд.
            - paragraph [ref=e70]:
              - text: Для обращения по вопросам персональных данных пользователь может связаться с оператором по телефону
              - link "+7 (499) 719-13-48" [ref=e71] [cursor=pointer]:
                - /url: tel:+74997191348
              - text: .
          - generic [ref=e72]:
            - heading "10. Защита данных" [level=2] [ref=e73]
            - paragraph [ref=e74]: Оператор принимает необходимые правовые, организационные и технические меры для защиты персональных данных от неправомерного доступа, изменения, раскрытия, блокирования, копирования, предоставления, распространения и иных неправомерных действий.
          - generic [ref=e75]:
            - heading "11. Изменение политики" [level=2] [ref=e76]
            - paragraph [ref=e77]: Оператор вправе обновлять настоящую политику при изменении сайта, состава сервисов, целей обработки или требований законодательства. Актуальная версия документа размещается на этой странице.
