          - heading "Политика конфиденциальности" [level=1] [ref=e19]
          - paragraph [ref=e20]: Единый документ описывает правила обработки персональных данных, согласие пользователя при отправке заявки и использование cookie на сайте ремонта кофемашин.
        - article [ref=e21]:
          - generic [ref=e22]:
            - heading "1. Общие положения" [level=2] [ref=e23]
            - paragraph [ref=e24]: Настоящая политика составлена в соответствии с Федеральным законом РФ от 27.07.2006 N 152-ФЗ «О персональных данных» и применяется к сайту, размещенному в сети Интернет для приема заявок на ремонт кофемашин в Москве.
            - paragraph [ref=e25]:
              - text: "Оператор персональных данных: владелец сайта, оказывающий услуги ремонта кофемашин в Москве. Контакт для обращений субъектов персональных данных:"
              - link "+7 (499) 719-13-48" [ref=e26] [cursor=pointer]:
                - /url: tel:+74997191348
              - text: .
            - paragraph [ref=e27]: "Перед публикацией сайта владельцу необходимо указать точное наименование оператора: ФИО, статус ИП/самозанятого или наименование юридического лица, а также актуальные контактные реквизиты."
          - generic [ref=e28]:
            - heading "2. Какие данные обрабатываются" [level=2] [ref=e29]
            - list [ref=e30]:
              - listitem [ref=e31]: имя пользователя, указанное в форме заявки;
              - listitem [ref=e32]: номер телефона;
              - listitem [ref=e33]: комментарий к заявке, модель кофемашины, описание неисправности и иная информация, которую пользователь указывает добровольно;
              - listitem [ref=e34]: "технические данные: IP-адрес, тип устройства и браузера, источник перехода, дата и время посещения, сведения о действиях на сайте;"
              - listitem [ref=e35]: cookie-файлы и аналогичные технологии, необходимые для работы сайта, аналитики посещаемости и улучшения пользовательского опыта.
            - paragraph [ref=e36]: Оператор не запрашивает специальные категории персональных данных, биометрические персональные данные, паспортные данные и платежные реквизиты через формы сайта.
          - generic [ref=e37]:
            - heading "3. Цели обработки" [level=2] [ref=e38]
            - list [ref=e39]:
              - listitem [ref=e40]: прием, обработка и уточнение заявок на ремонт кофемашин;
              - listitem [ref=e41]: обратная связь с пользователем по телефону, в Telegram, WhatsApp или иным выбранным способом связи;
              - listitem [ref=e42]: согласование диагностики, выезда мастера, стоимости и времени выполнения работ;
              - listitem [ref=e43]: обеспечение корректной работы сайта, защита от злоупотреблений и технических сбоев;
              - listitem [ref=e44]: анализ посещаемости и улучшение структуры, дизайна и содержания сайта;
              - listitem [ref=e45]: исполнение требований законодательства РФ.
          - generic [ref=e46]:
            - heading "4. Правовые основания обработки" [level=2] [ref=e47]
            - paragraph [ref=e48]: Обработка персональных данных осуществляется на основании согласия пользователя, выраженного путем проставления отметки в форме заявки и отправки формы, а также на основании действий пользователя, направленных на получение консультации или услуги.
          - generic [ref=e49]:
            - heading "5. Согласие на обработку персональных данных" [level=2] [ref=e50]
            - paragraph [ref=e51]: Заполняя форму заявки на сайте, проставляя отметку согласия и нажимая кнопку отправки формы, пользователь свободно, своей волей и в своем интересе дает оператору согласие на обработку персональных данных на условиях настоящего документа.
            - paragraph [ref=e52]: "Согласие предоставляется в отношении данных, указанных пользователем в форме: имени, номера телефона, комментария, сведений о кофемашине и описания неисправности. Также могут обрабатываться технические данные, необходимые для работы сайта и подтверждения факта обращения."
            - paragraph [ref=e53]:
              - text: Согласие действует до достижения целей обработки или до его отзыва пользователем. Пользователь вправе отозвать согласие, обратившись к оператору по телефону
              - link "+7 (499) 719-13-48" [ref=e54] [cursor=pointer]:
                - /url: tel:+74997191348
              - text: . После получения отзыва оператор прекращает обработку персональных данных, кроме случаев, когда продолжение обработки допускается законодательством РФ.
          - generic [ref=e55]:
            - heading "6. Использование cookie" [level=2] [ref=e56]
            - paragraph [ref=e57]: Сайт использует cookie для сохранения технических настроек, корректного отображения интерфейса, учета согласия на cookie, анализа посещаемости и повышения удобства работы сайта.
            - paragraph [ref=e58]: Пользователь может запретить или удалить cookie в настройках браузера. При отключении cookie отдельные функции сайта могут работать некорректно. Нажатие кнопки «Принять» в cookie-плашке означает согласие пользователя на использование cookie в рамках настоящей политики.
          - generic [ref=e59]:
            - heading "7. Действия с персональными данными и срок хранения" [level=2] [ref=e60]
            - paragraph [ref=e61]: Оператор может совершать с персональными данными сбор, запись, систематизацию, накопление, хранение, уточнение, использование, передачу в пределах целей обработки, обезличивание, блокирование, удаление и уничтожение.
            - paragraph [ref=e62]: Данные заявки хранятся до достижения целей обработки, отзыва согласия пользователем или истечения сроков, необходимых для защиты прав и законных интересов оператора. Технические cookie хранятся в течение срока, заданного настройками сайта и браузера пользователя.
          - generic [ref=e63]:
            - heading "8. Передача третьим лицам" [level=2] [ref=e64]
            - paragraph [ref=e65]: Оператор не продает и не передает персональные данные третьим лицам для самостоятельной рекламы. Передача возможна только в объеме, необходимом для работы сайта, связи с пользователем, хранения заявок, использования сервисов карт, хостинга, связи и аналитики, а также в случаях, предусмотренных законодательством РФ.
            - paragraph [ref=e66]: На сайте могут использоваться внешние сервисы, включая карты и средства связи. Такие сервисы могут получать технические данные пользователя в соответствии со своими правилами и настройками браузера.
          - generic [ref=e67]:
            - heading "9. Права пользователя" [level=2] [ref=e68]
            - list [ref=e69]:
              - listitem [ref=e70]: получать сведения об обработке своих персональных данных;
              - listitem [ref=e71]: требовать уточнения, блокирования или уничтожения персональных данных, если они являются неполными, устаревшими, неточными или обрабатываются незаконно;
              - listitem [ref=e72]: отозвать согласие на обработку персональных данных;
              - listitem [ref=e73]: обжаловать действия или бездействие оператора в уполномоченный орган или суд.
            - paragraph [ref=e74]:
              - text: Для обращения по вопросам персональных данных пользователь может связаться с оператором по телефону
              - link "+7 (499) 719-13-48" [ref=e75] [cursor=pointer]:
                - /url: tel:+74997191348
              - text: .
          - generic [ref=e76]:
            - heading "10. Защита данных" [level=2] [ref=e77]
            - paragraph [ref=e78]: Оператор принимает необходимые правовые, организационные и технические меры для защиты персональных данных от неправомерного доступа, изменения, раскрытия, блокирования, копирования, предоставления, распространения и иных неправомерных действий.
          - generic [ref=e79]:
            - heading "11. Изменение политики" [level=2] [ref=e80]
            - paragraph [ref=e81]: Оператор вправе обновлять настоящую политику при изменении сайта, состава сервисов, целей обработки или требований законодательства. Актуальная версия документа размещается на этой странице.
